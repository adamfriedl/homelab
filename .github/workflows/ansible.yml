# Ansible syntax-check on config/ changes (no GCP / VM access).
# Full plan/apply + converge on merge to main → .github/workflows/plan-and-apply.yml

name: Ansible

on:
  push:
    branches: [main]
    paths:
      - "config/**"
      - ".github/workflows/ansible.yml"
  pull_request:
    paths:
      - "config/**"
      - ".github/workflows/ansible.yml"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

defaults:
  run:
    working-directory: config

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: pip install ansible-core

      - name: ansible-playbook syntax-check
        run: |
          cat > inventory/ci_static.yml <<'EOF'
          all:
            children:
              gcp_lab:
                hosts:
                  ci-placeholder:
                    ansible_host: 127.0.0.1
          EOF
          ansible-playbook site.yml -i inventory/ci_static.yml --syntax-check
