# Plan on PR / weekly; apply + Ansible converge on merge to main.
# Ansible syntax-check only → .github/workflows/ansible.yml
#
# GCP auth (Workload Identity Federation):
#   1. CI service account (e.g. terraform-ci@PROJECT.iam.gserviceaccount.com) with roles/editor (or tighter),
#      storage.objectAdmin on state bucket (gcp-lab-tf-state), plus IAP + OS Login (Terraform grants the latter two).
#   2. WIF pool/provider → secrets GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT
#      Repo rename: apply infra/github_wif.tf once (see infra/README.md).
#
# Repository variables:
#   GCP_PROJECT_ID          required
#   GCP_REGION              optional (default us-central1)
#   GCP_ZONE                optional (default us-central1-c)
#   IAP_SSH_TUNNEL_MEMBER   optional — user:you@example.com (human SSH / IAP)
#
# Secret (keep in sync with config/.../tailscale_secrets.yml for laptop runs):
#   TAILSCALE_AUTH_KEY      tskey-auth-… reusable auth key from Tailscale admin → Keys
#
# Local one-time OS Login (after first terraform apply with os_login_admin_members):
#   gcloud compute os-login ssh-keys add --key-file=~/.ssh/google_compute_engine.pub
#   gcloud compute os-login describe-profile --format='value(posixAccounts[0].username)'

name: Plan and apply

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - "config/**"
      - ".github/workflows/plan-and-apply.yml"
  pull_request:
    paths:
      - "infra/**"
      - "config/**"
      - ".github/workflows/plan-and-apply.yml"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: plan-and-apply-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

  plan-or-apply:
    name: Terraform plan or apply
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v5

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"

      - name: Write terraform.tfvars for CI
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_ZONE: ${{ vars.GCP_ZONE }}
          IAP_SSH_TUNNEL_MEMBER: ${{ vars.IAP_SSH_TUNNEL_MEMBER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        run: |
          if [ -z "${GCP_PROJECT_ID}" ]; then
            echo "Set repository variable GCP_PROJECT_ID (Settings → Secrets and variables → Actions → Variables)."
            exit 1
          fi

          pool_id="${WIF_PROVIDER#*/workloadIdentityPools/}"
          pool_id="${pool_id%%/*}"
          if [ -z "${pool_id}" ] || [ "${pool_id}" = "${WIF_PROVIDER}" ]; then
            echo "Could not parse workload identity pool id from GCP_WORKLOAD_IDENTITY_PROVIDER."
            exit 1
          fi

          region="${GCP_REGION:-us-central1}"
          zone="${GCP_ZONE:-us-central1-c}"

          iap_members=()
          os_login_members=()

          if [ -n "${IAP_SSH_TUNNEL_MEMBER}" ]; then
            iap_members+=("\"${IAP_SSH_TUNNEL_MEMBER}\"")
            os_login_members+=("\"${IAP_SSH_TUNNEL_MEMBER}\"")
          fi

          if [ -n "${GCP_SERVICE_ACCOUNT}" ]; then
            sa_member="\"serviceAccount:${GCP_SERVICE_ACCOUNT}\""
            iap_members+=("${sa_member}")
            os_login_members+=("${sa_member}")
          fi

          {
            echo "project_id = \"${GCP_PROJECT_ID}\""
            echo "region     = \"${region}\""
            echo "zone       = \"${zone}\""
            echo "enable_external_public_ip = false"
            echo "enable_os_login = true"
            echo "enable_github_actions_wif = true"
            echo "github_repository = \"${{ github.repository }}\""
            echo "github_wif_pool_id = \"${pool_id}\""
            echo "ssh_source_ranges = []"
            printf '%s\n' "iap_ssh_tunnel_members = [$(IFS=,; echo "${iap_members[*]}")]"
            printf '%s\n' "os_login_admin_members = [$(IFS=,; echo "${os_login_members[*]}")]"
          } > terraform.tfvars

      - name: terraform init
        run: terraform init -input=false

      - name: terraform plan
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: terraform plan -no-color -input=false

      - name: terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -input=false

  converge:
    name: Ansible converge
    needs: plan-or-apply
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"

      - name: terraform init (inventory outputs)
        working-directory: infra
        run: terraform init -input=false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: pip install ansible-core

      - name: Read Terraform outputs for IAP tunnel
        id: tfout
        working-directory: infra
        run: |
          {
            echo "project_id=$(terraform output -raw project_id)"
            echo "zone=$(terraform output -raw zone)"
            echo "instance_name=$(terraform output -json instance_names | jq -r '.[0]')"
          } >> "${GITHUB_OUTPUT}"

      - name: OS Login SSH key for CI service account
        id: oslogin
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          if [ -z "${GCP_SERVICE_ACCOUNT}" ]; then
            echo "GCP_SERVICE_ACCOUNT secret is required for Ansible converge."
            exit 1
          fi

          mkdir -p "${HOME}/.ssh"
          ssh-keygen -t rsa -f "${HOME}/.ssh/ci_oslogin" -N "" -q

          gcloud compute os-login ssh-keys add --key-file="${HOME}/.ssh/ci_oslogin.pub"

          ansible_user="$(gcloud compute os-login describe-profile --format='value(posixAccounts[0].username)')"
          if [ -z "${ansible_user}" ]; then
            echo "OS Login profile has no POSIX username after ssh-keys add."
            exit 1
          fi

          echo "ansible_user=${ansible_user}" >> "${GITHUB_OUTPUT}"
          echo "ssh_private_key_file=${HOME}/.ssh/ci_oslogin" >> "${GITHUB_OUTPUT}"

      - name: Start IAP tunnel (background)
        run: |
          gcloud compute start-iap-tunnel "${{ steps.tfout.outputs.instance_name }}" 22 \
            --local-host-port=127.0.0.1:8222 \
            --zone="${{ steps.tfout.outputs.zone }}" \
            --project="${{ steps.tfout.outputs.project_id }}" &
          echo $! > /tmp/iap-tunnel.pid

          for _ in $(seq 1 30); do
            if nc -z 127.0.0.1 8222 2>/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "IAP tunnel did not become ready on 127.0.0.1:8222"
          exit 1

      - name: ansible-playbook site.yml
        working-directory: config
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          trap 'kill "$(cat /tmp/iap-tunnel.pid 2>/dev/null)" 2>/dev/null || true' EXIT

          cat > /tmp/ci-ssh.yml <<EOF
          ansible_user: ${{ steps.oslogin.outputs.ansible_user }}
          ansible_ssh_private_key_file: ${{ steps.oslogin.outputs.ssh_private_key_file }}
          ansible_host: 127.0.0.1
          ansible_port: 8222
          ansible_ssh_common_args: "-o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
          EOF

          extra=()
          if [ -n "${TAILSCALE_AUTH_KEY}" ]; then
            extra+=(-e "tailscale_auth_key=${TAILSCALE_AUTH_KEY}")
          fi

          ansible-playbook site.yml -e @/tmp/ci-ssh.yml --limit gcp_lab "${extra[@]}"
