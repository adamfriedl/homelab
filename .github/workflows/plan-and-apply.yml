# Plan on PR / weekly; apply + Ansible validate + converge on merge to main.
#
# GCP auth (Workload Identity Federation):
#   1. CI service account (e.g. terraform-ci@PROJECT.iam.gserviceaccount.com) with roles/editor (or tighter),
#      storage.objectAdmin on state bucket (gcp-lab-tf-state), plus IAP + OS Login (Terraform grants the latter two).
#   2. WIF pool/provider → secrets GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT
#      WIF bindings are one-time bootstrap (owner / gcloud), not managed by CI apply.
#
# Repository variables:
#   GCP_PROJECT_ID          required
#   GCP_REGION              optional (default us-central1)
#   GCP_ZONE                optional (default us-central1-c)
#   IAP_SSH_TUNNEL_MEMBER   optional — user:you@example.com (human SSH / IAP)
#
# Secret (keep in sync with config/.../tailscale_secrets.yml for laptop runs):
#   TAILSCALE_AUTH_KEY      tskey-auth-… reusable auth key from Tailscale admin → Keys
#
# Local one-time OS Login (after first terraform apply with os_login_admin_members):
#   gcloud compute os-login ssh-keys add --key-file=~/.ssh/google_compute_engine.pub
#   gcloud compute os-login describe-profile --format='value(posixAccounts[0].username)'
#
# Ansible validate (+ converge on main) runs as one job on tottipi — bootstrap once,
# reuse the same ephemeral OS Login key for ping and site.yml.
# Register runner first: config/compose/tottipi/github-runner/README.md

name: Plan and apply

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - "config/**"
      - ".github/workflows/plan-and-apply.yml"
      - ".github/actions/ansible-gcp-bootstrap/**"
  pull_request:
    paths:
      - "infra/**"
      - "config/**"
      - ".github/workflows/plan-and-apply.yml"
      - ".github/actions/ansible-gcp-bootstrap/**"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: plan-and-apply-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

  plan-or-apply:
    name: Terraform plan or apply
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v5

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"

      - name: Write terraform.tfvars for CI
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_ZONE: ${{ vars.GCP_ZONE }}
          IAP_SSH_TUNNEL_MEMBER: ${{ vars.IAP_SSH_TUNNEL_MEMBER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          if [ -z "${GCP_PROJECT_ID}" ]; then
            echo "Set repository variable GCP_PROJECT_ID (Settings → Secrets and variables → Actions → Variables)."
            exit 1
          fi

          region="${GCP_REGION:-us-central1}"
          zone="${GCP_ZONE:-us-central1-c}"

          iap_members=()
          os_login_members=()

          if [ -n "${IAP_SSH_TUNNEL_MEMBER}" ]; then
            iap_members+=("\"${IAP_SSH_TUNNEL_MEMBER}\"")
            os_login_members+=("\"${IAP_SSH_TUNNEL_MEMBER}\"")
          fi

          if [ -n "${GCP_SERVICE_ACCOUNT}" ]; then
            sa_member="\"serviceAccount:${GCP_SERVICE_ACCOUNT}\""
            iap_members+=("${sa_member}")
            os_login_members+=("${sa_member}")
          fi

          {
            echo "project_id = \"${GCP_PROJECT_ID}\""
            echo "region     = \"${region}\""
            echo "zone       = \"${zone}\""
            echo "enable_external_public_ip = false"
            echo "enable_cloud_nat = false"
            echo "enable_os_login = true"
            echo "ssh_source_ranges = []"
            printf '%s\n' "iap_ssh_tunnel_members = [$(IFS=,; echo "${iap_members[*]}")]"
            printf '%s\n' "os_login_admin_members = [$(IFS=,; echo "${os_login_members[*]}")]"
          } > terraform.tfvars

      - name: terraform init
        run: terraform init -input=false

      - name: terraform plan
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: terraform plan -no-color -input=false

      - name: terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -input=false

  ansible:
    name: Ansible validate and converge
    needs: plan-or-apply
    if: needs.plan-or-apply.result == 'success'
    runs-on: [self-hosted, homelab, tottipi]
    steps:
      - uses: actions/checkout@v5

      - name: Bootstrap GCP auth, inventory, and OS Login key
        id: bootstrap
        uses: ./.github/actions/ansible-gcp-bootstrap
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Write OS Login extra vars
        run: |
          cat > /tmp/ci-oslogin.yml <<EOF
          ansible_user: ${{ steps.bootstrap.outputs.ansible_user }}
          ansible_ssh_private_key_file: ${{ steps.bootstrap.outputs.ssh_private_key_file }}
          EOF

      - name: Verify real inventory
        working-directory: config
        run: |
          set -euo pipefail
          ansible-inventory --graph lab
          python3 <<'PY'
          import json
          import subprocess

          inv = json.loads(subprocess.check_output(["ansible-inventory", "--list"], text=True))
          gcp_hosts = inv.get("gcp_lab", {}).get("hosts", [])
          home_hosts = inv.get("home_lab", {}).get("hosts", [])
          if not gcp_hosts:
              raise SystemExit("gcp_lab has no hosts (terraform inventory empty?)")
          if "tottipi" not in home_hosts:
              raise SystemExit(f"home_lab missing tottipi (got {home_hosts!r})")
          print(f"gcp_lab: {gcp_hosts}")
          print(f"home_lab: {home_hosts}")
          PY

      - name: ansible-playbook syntax-check
        working-directory: config
        run: ansible-playbook site.yml --syntax-check

      - name: Ping gcp_lab over tailnet
        working-directory: config
        run: ansible gcp_lab -m ping -e @/tmp/ci-oslogin.yml

      - name: ansible-playbook site.yml
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: config
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          extra=()
          if [ -n "${TAILSCALE_AUTH_KEY}" ]; then
            extra+=(-e "tailscale_auth_key=${TAILSCALE_AUTH_KEY}")
          fi

          ansible-playbook site.yml -e @/tmp/ci-oslogin.yml --limit gcp_lab "${extra[@]}"
