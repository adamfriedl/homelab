# CI: plan-and-apply workflow. Secrets, variables, and OS Login setup: docs/ci.md

name: Plan and apply

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - "config/**"
      - ".github/workflows/plan-and-apply.yml"
      - ".github/actions/ansible-gcp-bootstrap/**"
  pull_request:
    paths:
      - "infra/**"
      - "config/**"
      - ".github/workflows/plan-and-apply.yml"
      - ".github/actions/ansible-gcp-bootstrap/**"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: plan-and-apply-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TF_VERSION: "1.9.8"

jobs:
  validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

  plan-or-apply:
    name: Terraform plan or apply
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v5

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Write terraform.tfvars for CI
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_ZONE: ${{ vars.GCP_ZONE }}
          IAP_SSH_TUNNEL_MEMBER: ${{ vars.IAP_SSH_TUNNEL_MEMBER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          if [ -z "${GCP_PROJECT_ID}" ]; then
            echo "Set repository variable GCP_PROJECT_ID (Settings → Secrets and variables → Actions → Variables)."
            exit 1
          fi

          region="${GCP_REGION:-us-central1}"
          zone="${GCP_ZONE:-us-central1-c}"

          iap_members=()
          os_login_members=()

          if [ -n "${IAP_SSH_TUNNEL_MEMBER}" ]; then
            iap_members+=("\"${IAP_SSH_TUNNEL_MEMBER}\"")
            os_login_members+=("\"${IAP_SSH_TUNNEL_MEMBER}\"")
          fi

          if [ -n "${GCP_SERVICE_ACCOUNT}" ]; then
            sa_member="\"serviceAccount:${GCP_SERVICE_ACCOUNT}\""
            iap_members+=("${sa_member}")
            os_login_members+=("${sa_member}")
          fi

          {
            echo "project_id = \"${GCP_PROJECT_ID}\""
            echo "region     = \"${region}\""
            echo "zone       = \"${zone}\""
            printf '%s\n' "iap_ssh_tunnel_members = [$(IFS=,; echo "${iap_members[*]}")]"
            printf '%s\n' "os_login_admin_members = [$(IFS=,; echo "${os_login_members[*]}")]"
          } > terraform.tfvars

      - name: terraform init
        run: terraform init -input=false

      - name: terraform plan
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: terraform plan -no-color -input=false

      - name: terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -input=false

  ansible:
    name: Ansible validate and converge
    needs: plan-or-apply
    if: needs.plan-or-apply.result == 'success' && github.event_name != 'schedule'
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Ansible
        run: pip install ansible-core

      - name: ansible-playbook syntax-check
        working-directory: config
        run: ansible-playbook site.yml --syntax-check

      - uses: google-github-actions/setup-gcloud@v3

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Bootstrap GCP auth, inventory, and OS Login key
        id: bootstrap
        uses: ./.github/actions/ansible-gcp-bootstrap
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Write OS Login extra vars
        run: |
          cat > /tmp/ci-oslogin.yml <<EOF
          ansible_user: ${{ steps.bootstrap.outputs.ansible_user }}
          ansible_ssh_private_key_file: ${{ steps.bootstrap.outputs.ssh_private_key_file }}
          EOF

      - name: Verify inventory
        working-directory: config
        run: |
          set -euo pipefail
          ansible-inventory --graph gcp_lab
          python3 -c "
          import json, subprocess
          inv = json.loads(subprocess.check_output(['ansible-inventory', '--list'], text=True))
          hosts = inv.get('gcp_lab', {}).get('hosts', [])
          assert hosts, 'gcp_lab has no hosts (terraform inventory empty?)'
          print('gcp_lab:', hosts)
          "

      - name: ansible-playbook site.yml
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: config
        run: ansible-playbook site.yml -e @/tmp/ci-oslogin.yml
