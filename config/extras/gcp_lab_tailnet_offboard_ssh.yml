---
# One-time offboard when IAP is still broken (exit node active on gcp-lab-1).
#   ansible-playbook offboard-gcp-tailscale.yml --limit gcp_lab \
#     -e @extras/gcp_lab_tailnet_offboard_ssh.yml
#
# After offboard, use default iap_ssh.yml for steady state.

ansible_host: gcp-lab-1
ansible_ssh_common_args: >-
  -o IdentitiesOnly=yes
  -o StrictHostKeyChecking=accept-new
