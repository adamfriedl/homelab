# Steady-state: SSH to gcp-lab-1 via IAP (Cloud NAT provides egress; no Tailscale).
ansible_host: "{{ inventory_hostname }}"

ansible_ssh_common_args: >-
  -o IdentitiesOnly=yes
  -o StrictHostKeyChecking=accept-new
  -o ControlMaster=auto
  -o ControlPersist=300
  -o ControlPath=/tmp/ansible-iap-%C
  -o ProxyCommand="gcloud compute start-iap-tunnel {{ inventory_hostname }} 22 --listen-on-stdin --zone={{ gcp_zone }} --project={{ gcp_project_id }}"
