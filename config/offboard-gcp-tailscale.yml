---
# One-time: remove Tailscale exit-node coupling from gcp_lab before steady-state IAP converge.
# Requires Cloud NAT on and IAP SSH working (see docs/networking.md).
#
#   cd config
#   ansible-playbook offboard-gcp-tailscale.yml --limit gcp_lab

- name: Offboard gcp_lab from Tailscale
  hosts: gcp_lab
  gather_facts: false
  become: true
  tasks:
    - name: Check whether tailscale CLI is installed
      command: command -v tailscale
      register: tailscale_cli
      changed_when: false
      failed_when: false

    - name: Clear exit node (restores IAP-friendly routing)
      command: tailscale set --exit-node=
      when: tailscale_cli.rc == 0
      changed_when: true

    - name: Stop and disable tailscaled
      ansible.builtin.systemd:
        name: tailscaled
        state: stopped
        enabled: false
      failed_when: false

    - name: Remove Tailscale packages
      ansible.builtin.apt:
        name:
          - tailscale
          - tailscale-archive-keyring
        state: absent
        purge: true
      failed_when: false
