---
- name: Baseline converge for lab hosts (GCP + home)
  hosts: lab
  gather_facts: true
  become: true
  roles:
    - role: common

    # gcp_lab: tailscale_auth_key in tailscale_secrets.yml. home_lab: advertise exit node, etc.
    - role: tailscale
      when: >-
        (tailscale_auth_key | default("", true) | length > 0)
        or (tailscale_advertise_exit_node | default(false) | bool)
        or (tailscale_exit_node | default("", true) | length > 0)
