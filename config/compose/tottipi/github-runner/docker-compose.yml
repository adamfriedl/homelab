# Self-hosted GitHub Actions runner for homelab CI converge.
# Uses host networking so jobs reach gcp-lab-1 over the Pi's tailnet routes.

services:
  github-runner:
    build: .
    image: homelab-github-runner:local
    container_name: homelab-github-runner
    stop_grace_period: 60s
    network_mode: host
    env_file:
      - .env
    environment:
      DISABLE_AUTOMATIC_DEREGISTRATION: "true"
      # Persist registration in ./data across restarts (required by myoung34/github-runner).
      CONFIGURED_ACTIONS_RUNNER_FILES_DIR: /runner
    volumes:
      - ./data:/runner
      # Host resolv.conf has Tailscale MagicDNS (100.100.100.100); Docker would inject LAN DNS otherwise.
      - /etc/resolv.conf:/etc/resolv.conf:ro
    restart: unless-stopped
