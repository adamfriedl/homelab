---
# One-time: enable passwordless sudo so site.yml can use become: true.
#   ansible-playbook bootstrap-home-sudo.yml --ask-become-pass
- name: Bootstrap passwordless sudo for Ansible (home lab)
  hosts: home_lab
  gather_facts: false
  become: true
  tasks:
    - name: Install sudoers drop-in for Ansible user
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/{{ ansible_user }}-ansible"
        content: "{{ ansible_user }} ALL=(ALL) NOPASSWD:ALL\n"
        mode: "0440"
        validate: visudo -cf %s
