---
# Privileged APT + tailscaled + tailscale CLI (install path before status check).
- name: Refuse unsupported OS families (lab uses Ubuntu/Debian on GCE)
  ansible.builtin.fail:
    msg: "tailscale role only supports Debian family images (Ubuntu and Debian; os_family=Debian)."
  when: ansible_facts['os_family'] != "Debian"

- name: Install and configure Tailscale
  become: true
  block:
    - name: Set Tailscale apt distribution name
      ansible.builtin.set_fact:
        tailscale_pkg_distro: >-
          {{ "ubuntu" if ansible_facts['distribution'] == "Ubuntu" else "debian" }}

    # Tailscale now ships .noarmor.gpg (binary keyring) for APT signed-by; plain .gpg can break verification (NO_PUBKEY 458CA832957F5868).

    - name: Install Tailscale GPG keyring
      ansible.builtin.get_url:
        url: >-
          https://pkgs.tailscale.com/stable/{{ tailscale_pkg_distro }}/{{ ansible_facts['distribution_release'] }}.noarmor.gpg
        dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
        mode: "0644"

    - name: Tailscale APT source list (upstream signed-by line)
      ansible.builtin.get_url:
        url: >-
          https://pkgs.tailscale.com/stable/{{ tailscale_pkg_distro }}/{{ ansible_facts['distribution_release'] }}.tailscale-keyring.list
        dest: /etc/apt/sources.list.d/tailscale.list
        force: false
        mode: "0644"
    - name: Install tailscale package
      ansible.builtin.apt:
        name:
          - tailscale-archive-keyring
          - tailscale
        state: present
        update_cache: true

    - name: Ensure tailscaled is running
      ansible.builtin.service:
        name: tailscaled
        state: started
        enabled: true

    - name: Check tailnet state (JSON — exit code is unreliable when "Logged out")
      ansible.builtin.command: tailscale status --json
      register: tailscale_status_json
      changed_when: false
      failed_when: false

    # tailscale status can return rc=0 while still showing "Logged out"; never skip join on rc alone.
    - name: Derive whether this node has a tailnet IP (actually joined)
      when:
        - tailscale_status_json.rc == 0
        - tailscale_status_json.stdout is defined
        - tailscale_status_json.stdout | trim | length > 0
      block:
        - name: Parse Tailscale IPs from JSON
          ansible.builtin.set_fact:
            tailscale_logged_in: >-
              {{
                (tailscale_status_json.stdout | from_json).TailscaleIPs | default([])
                | length > 0
              }}
      rescue:
        - name: Assume not joined if JSON could not be parsed
          ansible.builtin.set_fact:
            tailscale_logged_in: false

    - name: Mark not joined when status-json failed outright
      ansible.builtin.set_fact:
        tailscale_logged_in: false
      when: tailscale_logged_in is not defined

    # Shared argv for tailscale up: used on first join (with --auth-key appended) and afterward
    # to apply flags like --ssh on nodes already logged in.

    - name: Build tailscale up argv base
      ansible.builtin.set_fact:
        tailscale_up_argv:
          - tailscale
          - up
          - "{{ '--accept-routes=' ~ (tailscale_accept_routes_effective | ternary('true', 'false')) }}"
      vars:
        tailscale_accept_routes_effective: >-
          {{
            (tailscale_accept_routes | bool)
            or (tailscale_exit_node | default("", true) | length > 0)
          }}
      when: tailscale_auth_key | default("", true) | length > 0

    - name: Append Tailscale SSH server (tailscale ssh)
      ansible.builtin.set_fact:
        tailscale_up_argv: "{{ tailscale_up_argv + ['--ssh'] }}"
      when:
        - tailscale_up_argv is defined
        - tailscale_enable_ssh_server | default(true)

    - name: Append optional hostname
      ansible.builtin.set_fact:
        tailscale_up_argv: "{{ tailscale_up_argv + ['--hostname=' + tailscale_hostname] }}"
      when:
        - tailscale_up_argv is defined
        - tailscale_hostname | default("", true) | length > 0

    - name: Append optional advertise-tags
      ansible.builtin.set_fact:
        tailscale_up_argv: "{{ tailscale_up_argv + ['--advertise-tags=' + tailscale_advertise_tags] }}"
      when:
        - tailscale_up_argv is defined
        - tailscale_advertise_tags | default("", true) | length > 0

    # Same as Tailscale docs: `sudo tailscale up --auth-key=tskey-...`
    # https://tailscale.com/docs/features/access-control/auth-keys#register-a-node-with-the-auth-key
    # Keys are case-sensitive; `no_log` hides Ansible output (process list may still see argv briefly).
    - name: Join tailnet (--auth-key, first join only)
      ansible.builtin.command:
        argv: "{{ tailscale_up_argv + ['--auth-key=' ~ tailscale_auth_key] }}"
      when:
        - tailscale_up_argv is defined
        - not (tailscale_logged_in | bool)
      async: 720
      poll: 15
      register: tailscale_join
      changed_when: tailscale_join.rc == 0
      failed_when: tailscale_join.rc != 0
      no_log: true

    - name: Apply tailscale prefs when already authenticated (e.g. --ssh for tailscale ssh)
      ansible.builtin.command:
        argv: "{{ tailscale_up_argv }}"
      when:
        - tailscale_up_argv is defined
        - tailscale_logged_in | bool
      changed_when: false
      async: 120
      poll: 5

    - name: Turn off Tailscale SSH when opted out (--ssh persists otherwise)
      ansible.builtin.command:
        argv:
          - tailscale
          - set
          - --ssh=false
      when:
        - tailscale_up_argv is defined
        - not (tailscale_enable_ssh_server | default(true))
        - tailscale_logged_in | bool
      changed_when: false

    - name: Configure exit node (after join — peers visible in status JSON)
      when: tailscale_exit_node | default("", true) | length > 0
      block:
        - name: Refresh tailnet peer list for exit-node lookup
          ansible.builtin.command: tailscale status --json
          register: tailscale_peers_json
          changed_when: false

        - name: Resolve exit node hostname to Tailscale IPv4
          ansible.builtin.set_fact:
            tailscale_exit_node_effective: >-
              {{
                (
                  (tailscale_peers_json.stdout | from_json).Peer.values()
                  | selectattr('HostName', 'equalto', tailscale_exit_node)
                  | map(attribute='TailscaleIPs')
                  | flatten
                  | first
                  | default(none)
                )
              }}
          when:
            - tailscale_exit_node_resolve | default(true) | bool
            - not (tailscale_exit_node | regex_search('^\\d+\\.\\d+\\.\\d+\\.\\d+$'))

        - name: Use configured exit node when not resolving (IP or hostname)
          ansible.builtin.set_fact:
            tailscale_exit_node_effective: "{{ tailscale_exit_node }}"
          when: tailscale_exit_node_effective is not defined

        - name: Fail when exit node hostname is missing from tailnet
          ansible.builtin.fail:
            msg: >-
              No peer HostName={{ tailscale_exit_node }} in `tailscale status --json`.
              Confirm apple-tv is online, or set tailscale_exit_node to its Tailscale IP
              (e.g. 100.119.241.51) with tailscale_exit_node_resolve: false.
          when:
            - tailscale_exit_node_resolve | default(true) | bool
            - not (tailscale_exit_node | regex_search('^\\d+\\.\\d+\\.\\d+\\.\\d+$'))
            - tailscale_exit_node_effective is none

        - name: Apply exit node
          ansible.builtin.command:
            argv:
              - tailscale
              - set
              - "--exit-node={{ tailscale_exit_node_effective }}"
              - "--exit-node-allow-lan-access={{ tailscale_exit_node_allow_lan_access | ternary('true', 'false') }}"
          changed_when: false
