---
# Privileged APT + tailscaled + tailscale CLI (install path before status check).
- name: Refuse unsupported OS families (lab uses Ubuntu/Debian on GCE)
  ansible.builtin.fail:
    msg: "tailscale role only supports Debian family images (Ubuntu and Debian; os_family=Debian)."
  when: ansible_facts['os_family'] != "Debian"

- name: Check tailnet state (JSON — exit code is unreliable when "Logged out")
  ansible.builtin.command:
    cmd: tailscale status --json
  register: tailscale_status_json
  changed_when: false
  failed_when: false
  timeout: 30

# tailscale status can return rc=0 while still showing "Logged out"; never skip join on rc alone.
- name: Derive whether this node has a tailnet IP (actually joined)
  when:
    - tailscale_status_json.rc == 0
    - tailscale_status_json.stdout is defined
    - tailscale_status_json.stdout | trim | length > 0
  block:
    - name: Parse Tailscale IPs from JSON
      ansible.builtin.set_fact:
        tailscale_logged_in: >-
          {{
            ((tailscale_status_json.stdout | from_json).TailscaleIPs | default([], true))
            | length > 0
          }}
  rescue:
    - name: Assume not joined if JSON could not be parsed
      ansible.builtin.set_fact:
        tailscale_logged_in: false

- name: Mark not joined when status-json failed outright
  ansible.builtin.set_fact:
    tailscale_logged_in: false
  when: tailscale_logged_in is not defined

- name: Already on tailnet — skipping package install and join
  ansible.builtin.debug:
    msg: Node has a Tailscale IP; skipping apt install and tailscale up.
  when: tailscale_logged_in | bool

- name: Install and configure Tailscale
  become: true
  block:
    - name: Install Tailscale packages (fresh nodes only)
      when: not (tailscale_logged_in | bool)
      block:
        - name: Set Tailscale apt distribution name
          ansible.builtin.set_fact:
            tailscale_pkg_distro: >-
              {{ "ubuntu" if ansible_facts['distribution'] == "Ubuntu" else "debian" }}

        # Tailscale now ships .noarmor.gpg (binary keyring) for APT signed-by; plain .gpg can break verification (NO_PUBKEY 458CA832957F5868).

        - name: Install Tailscale GPG keyring
          ansible.builtin.get_url:
            url: >-
              https://pkgs.tailscale.com/stable/{{ tailscale_pkg_distro }}/{{ ansible_facts['distribution_release'] }}.noarmor.gpg
            dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
            mode: "0644"

        - name: Tailscale APT source list (upstream signed-by line)
          ansible.builtin.get_url:
            url: >-
              https://pkgs.tailscale.com/stable/{{ tailscale_pkg_distro }}/{{ ansible_facts['distribution_release'] }}.tailscale-keyring.list
            dest: /etc/apt/sources.list.d/tailscale.list
            force: false
            mode: "0644"

        - name: Install tailscale package
          ansible.builtin.apt:
            name:
              - tailscale-archive-keyring
              - tailscale
            state: present
            update_cache: true

        - name: Ensure tailscaled is running
          ansible.builtin.service:
            name: tailscaled
            state: started
            enabled: true

    # Shared argv for tailscale up: used on first join (with --auth-key appended) and afterward
    # to apply flags like --ssh on nodes already logged in.

    - name: Build tailscale up argv base
      ansible.builtin.set_fact:
        tailscale_up_argv:
          - tailscale
          - up
          - "{{ '--accept-routes=' ~ (tailscale_accept_routes | bool | ternary('true', 'false')) }}"
          - "{{ '--accept-dns=' ~ (tailscale_accept_dns | bool | ternary('true', 'false')) }}"
      when: tailscale_auth_key | default("", true) | length > 0

    - name: Append Tailscale SSH server (tailscale ssh)
      ansible.builtin.set_fact:
        tailscale_up_argv: "{{ tailscale_up_argv + ['--ssh'] }}"
      when:
        - tailscale_up_argv is defined
        - tailscale_enable_ssh_server | default(true)

    - name: Append optional hostname
      ansible.builtin.set_fact:
        tailscale_up_argv: "{{ tailscale_up_argv + ['--hostname=' + tailscale_hostname] }}"
      when:
        - tailscale_up_argv is defined
        - tailscale_hostname | default("", true) | length > 0

    - name: Append optional advertise-tags
      ansible.builtin.set_fact:
        tailscale_up_argv: "{{ tailscale_up_argv + ['--advertise-tags=' + tailscale_advertise_tags] }}"
      when:
        - tailscale_up_argv is defined
        - tailscale_advertise_tags | default("", true) | length > 0

    - name: Append optional advertise-exit-node (first join)
      ansible.builtin.set_fact:
        tailscale_up_argv: "{{ tailscale_up_argv + ['--advertise-exit-node'] }}"
      when:
        - tailscale_up_argv is defined
        - tailscale_advertise_exit_node | default(false) | bool

    - name: Append optional exit-node (first join)
      ansible.builtin.set_fact:
        tailscale_up_argv: >-
          {{
            tailscale_up_argv
            + ['--exit-node=' + tailscale_exit_node]
            + ['--exit-node-allow-lan-access='
               + (tailscale_exit_node_allow_lan_access | bool | ternary('true', 'false'))]
          }}
      when:
        - tailscale_up_argv is defined
        - tailscale_exit_node | default("", true) | length > 0

    # Auth keys are tskey-auth-… — not Tailscale API keys (tskey-api-…) or other admin tokens.
    - name: Refuse invalid tailscale_auth_key shape before join
      ansible.builtin.fail:
        msg: >-
          tailscale_auth_key must be a reusable/pre-auth key from Tailscale admin → Settings → Keys
          (starts with tskey-auth-). API keys and OAuth tokens are rejected by tailscale up.
      when:
        - tailscale_auth_key | default("", true) | length > 0
        - not (tailscale_auth_key is match('^tskey-auth-'))

    # Same as Tailscale docs: `sudo tailscale up --auth-key=tskey-...`
    # https://tailscale.com/docs/features/access-control/auth-keys#register-a-node-with-the-auth-key
    # Keys are case-sensitive; `no_log` hides Ansible output (process list may still see argv briefly).
    - name: Join tailnet (--auth-key, first join only)
      ansible.builtin.command:
        argv: "{{ tailscale_up_argv + ['--auth-key=' ~ tailscale_auth_key] }}"
      when:
        - tailscale_up_argv is defined
        - not (tailscale_logged_in | bool)
      async: 720
      poll: 15
      register: tailscale_join
      changed_when: tailscale_join.rc == 0
      failed_when: false
      no_log: true

    - name: Report tailscale join failure (stderr only — key redacted)
      ansible.builtin.fail:
        msg: >-
          tailscale up failed (rc={{ tailscale_join.rc }}).
          {{ tailscale_join.stderr | default('no stderr') | trim }}
          Check tailscale_auth_key in tailscale_secrets.yml (must be tskey-auth-… from admin → Keys).
          VM: sudo journalctl -u tailscaled -n 20
      when:
        - tailscale_join is defined
        - tailscale_join.rc | default(0) != 0

- name: Enable kernel forwarding for exit node advertisement
  when: tailscale_advertise_exit_node | default(false) | bool
  block:
    - name: Persist IP forwarding sysctl for Tailscale exit node
      ansible.builtin.copy:
        dest: /etc/sysctl.d/70-tailscale-forwarding.conf
        mode: "0644"
        content: |
          net.ipv4.ip_forward = 1
          net.ipv6.conf.all.forwarding = 1
      register: tailscale_forwarding_sysctl

    - name: Apply IP forwarding sysctl now
      ansible.builtin.command:
        cmd: sysctl -p /etc/sysctl.d/70-tailscale-forwarding.conf
      changed_when: tailscale_forwarding_sysctl.changed

- name: Build tailscale set argv (joined nodes — avoids up --reset)
  when: tailscale_logged_in | bool
  block:
    - name: Init tailscale set argv
      ansible.builtin.set_fact:
        tailscale_set_argv:
          - tailscale
          - set

    - name: Append accept-routes to tailscale set
      ansible.builtin.set_fact:
        tailscale_set_argv: >-
          {{
            tailscale_set_argv
            + ['--accept-routes=' + (tailscale_accept_routes | bool | ternary('true', 'false'))]
          }}

    - name: Append accept-dns to tailscale set
      ansible.builtin.set_fact:
        tailscale_set_argv: >-
          {{
            tailscale_set_argv
            + ['--accept-dns=' + (tailscale_accept_dns | bool | ternary('true', 'false'))]
          }}

    - name: Append SSH server pref to tailscale set
      ansible.builtin.set_fact:
        tailscale_set_argv: >-
          {{
            tailscale_set_argv
            + ['--ssh=' + (tailscale_enable_ssh_server | default(true) | ternary('true', 'false'))]
          }}

    - name: Append advertise-exit-node to tailscale set
      ansible.builtin.set_fact:
        tailscale_set_argv: "{{ tailscale_set_argv + ['--advertise-exit-node'] }}"
      when: tailscale_advertise_exit_node | default(false) | bool

    - name: Append exit-node to tailscale set
      ansible.builtin.set_fact:
        tailscale_set_argv: >-
          {{
            tailscale_set_argv
            + ['--exit-node=' + tailscale_exit_node]
            + ['--exit-node-allow-lan-access='
               + (tailscale_exit_node_allow_lan_access | bool | ternary('true', 'false'))]
          }}
      when: tailscale_exit_node | default("", true) | length > 0

    - name: Apply tailscale prefs when already authenticated
      ansible.builtin.command:
        argv: "{{ tailscale_set_argv }}"
      changed_when: false
