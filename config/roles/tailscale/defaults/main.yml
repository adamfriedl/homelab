---
# Prefer inventory/group_vars/gcp_lab/tailscale_secrets.yml (auto-merged).
# Alternative: ansible-playbook site.yml -e @path/to/secrets.yml
# Generated in Tailscale admin: Settings → Keys (reusable/pre-auth key recommended for automation).
tailscale_auth_key: ""

# If true, node accepts subnets/routes advertised by other tailnet peers.
tailscale_accept_routes: false

# Optional Tailscale HTTPS DNS name suffix (omit to use GCP instance name automatically).
tailscale_hostname: ""

# Run Tailscale's SSH daemon so peers can use `tailscale ssh user@node` per ACL.
tailscale_enable_ssh_server: true

# ACL tags, comma-separated — must be allowed by your ACLs, e.g. "tag:gcp-lab".
tailscale_advertise_tags: ""
